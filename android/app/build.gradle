plugins {
    id("com.android.application")
    id("kotlin-android")
    id("dev.flutter.flutter-gradle-plugin")
}

import java.util.Properties

// Cargar propiedades del keystore
def keystorePropertiesFile = rootProject.file("key.properties")
def keystoreProperties = new Properties()
keystoreProperties.load(new FileInputStream(keystorePropertiesFile))



android {
    namespace = "com.kirby.aura"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = "29.0.14206865"

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
        coreLibraryDesugaringEnabled = true
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    buildFeatures {
        buildConfig = true
    }

    defaultConfig {
        applicationId = "com.kirby.aura"
        minSdk = 24
        targetSdk = 36
        versionCode = flutter.versionCode.toInteger()
        versionName = flutter.versionName
        
        // Configuración de seguridad
        multiDexEnabled true
        
        // Configuración para prevenir el uso de API obsoletas
        buildConfigField("boolean", "ENABLE_R8_FULL_MODE", "true")
        
        // Configuración de rendimiento
        ndk {
            debugSymbolLevel 'FULL'
        }
    }
    
    // Configuración de firma
    // Bloques duplicados eliminados. Se utilizan las configuraciones definidas más abajo.
    
    packagingOptions {
        // Enable 16KB page size support
        jniLibs {
            useLegacyPackaging = false
            pickFirsts += [
                '**/lib/arm64-v8a/libapp.so',
                '**/lib/arm64-v8a/libflutter.so',
                '**/lib/arm64-v8a/libaudiotags.so',
                '**/lib/armeabi-v7a/libapp.so',
                '**/lib/armeabi-v7a/libflutter.so',
                '**/lib/armeabi-v7a/libaudiotags.so',
                '**/lib/x86_64/libapp.so',
                '**/lib/x86_64/libflutter.so',
                '**/lib/x86_64/libaudiotags.so',
                '**/lib/x86/libapp.so',
                '**/lib/x86/libflutter.so',
                '**/lib/x86/libaudiotags.so'
            ]
        }
        
        resources {
            excludes += [
                '/META-INF/{AL2.0,LGPL2.1}',
                '**/lib/*/libmp3lame*',
                '**/lib/*/libmpg123*',
                '**/lib/*/libvorbis*',
                '**/lib/*/libogg*',
                '**/lib/*/libFLAC*',
                '**/libaudio*'
            ]
            pickFirsts += [
                '**/lib/arm64-v8a/libc++_shared.so',
                '**/lib/armeabi-v7a/libc++_shared.so',
                '**/lib/x86/libc++_shared.so',
                '**/lib/x86_64/libc++_shared.so'
            ]
        }
    }

    // Enable 16KB page size support
    androidResources {
        additionalParameters '--warn-manifest-validation'
    }

    signingConfigs {
        release {
            keyAlias keystoreProperties['keyAlias']
            keyPassword keystoreProperties['keyPassword']
            storeFile file(keystoreProperties['storeFile'])
            storePassword keystoreProperties['storePassword']
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled false
            shrinkResources false
            // Asegurar alineamiento de 16KB
            ndk {
                debugSymbolLevel 'FULL'
            }
        }
    }
    
    // Configuración adicional para 16KB
    // Configuración de nombres de archivo APK
    applicationVariants.all { variant ->
        variant.outputs.all { output ->
            def project = "AuraMusic"
            def SEP = "-"
            def version = variant.versionName
            
            def abi = output.getFilter("ABI")
            
            if (abi == null) {
                // Fallback: detectar ABI desde el nombre del output si el filtro es nulo
                if (output.name.contains("armeabi-v7a")) abi = "armeabi-v7a"
                else if (output.name.contains("arm64-v8a")) abi = "arm64-v8a"
                else if (output.name.contains("x86_64")) abi = "x86_64"
                else if (output.name.contains("x86")) abi = "x86"
            }
            
            if (abi != null) {
                output.outputFileName = "${project}${SEP}v${version}${SEP}${abi}.apk"
            } else {
                output.outputFileName = "${project}${SEP}v${version}${SEP}universal.apk"
            }
        }
    }
}

dependencies {
    implementation 'androidx.multidex:multidex:2.0.1'
    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.1.4")
}

tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {
    kotlinOptions {
        jvmTarget = "17"
    }
}

flutter {
    source = "../.."
}
